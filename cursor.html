<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Composant — Custom Cursor (spring physics)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cursor.css">
<style>
  :root {
    --bg: #0B0E14;
    --bg-elevated: #12161F;
    --border: rgba(255,255,255,0.09);
    --text: #E8EAED;
    --text-muted: #8B93A7;
    --accent-cyan: #5EEAD4;
    --accent-amber: #F5A623;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-body);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 40px; padding: 60px 24px;
  }
  a, button { color: inherit; text-decoration: none; font: inherit; }

  h1 { font-family: var(--font-display); font-size: clamp(1.6rem, 4vw, 2.4rem); text-align: center; }
  p.note { font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); text-align: center; max-width: 440px; line-height: 1.7; }

  .playground {
    width: min(560px, 90vw);
    height: 340px;
    border: 1px solid var(--border);
    border-radius: 32px;
    background: var(--bg-elevated);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .demo-btn {
    padding: 14px 26px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 0.9rem;
  }
  .demo-btn.filled { background: var(--text); color: var(--bg); border: none; }
</style>
</head>
<body>

<h1>Custom cursor — spring physics</h1>
<p class="note">// Bougez la souris. Ce curseur est partagé sur tous les composants (navbar, menu, footer). Il grossit au survol des éléments cliquables.</p>

<div class="playground">
  <button class="demo-btn filled">Bouton</button>
  <a href="#" class="demo-btn">Lien</a>
  <button class="demo-btn">Autre bouton</button>
</div>

<script src="cursor.js"></script>
</body>
</html>
