<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Composant — Footer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cursor.css">
<style>
  :root {
    --bg: #111111;
    --text: #ffffff;
    --text-muted: rgba(255, 255, 255, 0.72);
    --accent: #FF3B30;
    --pill-bg: #ffffff;
    --pill-text: #111111;
    --social-bg: rgba(255, 255, 255, 0.12);
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --ease: cubic-bezier(0.65, 0, 0.35, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .demo-filler {
    padding: 60px 40px;
    font-family: var(--font-body);
    color: rgba(255, 255, 255, 0.35);
    font-size: 0.85rem;
  }

  /* ============ FOOTER ============ */
  .footer {
    position: relative;
    background: var(--bg);
    padding: 72px 56px 0;
    overflow: hidden;
  }

  .footer-main {
    display: grid;
    grid-template-columns: 1.15fr 1fr 0.85fr;
    gap: 48px 64px;
    align-items: start;
    padding-bottom: 64px;
  }

  /* Left — tagline + socials */
  .footer-brand {
    opacity: 0;
    transform: translateY(24px);
  }

  .footer-tagline {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(2rem, 3.4vw, 3.25rem);
    line-height: 1.08;
    letter-spacing: -0.03em;
    color: var(--text);
    max-width: 360px;
    margin-bottom: 28px;
  }

  .social-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .social-pill {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--social-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    transition: background 0.3s var(--ease), transform 0.3s var(--ease), color 0.3s var(--ease);
  }

  .social-pill svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  .social-pill:hover {
    background: var(--accent);
    color: var(--text);
    transform: translateY(-3px);
  }

  /* Middle / Right columns */
  .footer-col {
    opacity: 0;
    transform: translateY(24px);
  }

  .footer-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 22px;
  }

  .label-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .pill-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    max-width: 380px;
  }

  .pill-link {
    display: inline-flex;
    align-items: center;
    padding: 11px 20px;
    background: var(--pill-bg);
    color: var(--pill-text);
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: background 0.3s var(--ease), color 0.3s var(--ease), transform 0.3s var(--ease);
  }

  .pill-link:hover {
    background: var(--accent);
    color: var(--text);
    transform: translateY(-2px);
  }

  .footer-contact-link {
    display: block;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 10px;
    transition: color 0.25s var(--ease);
  }

  .footer-contact-link:hover { color: var(--accent); }

  .footer-address {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    max-width: 260px;
  }

  /* Giant wordmark */
  .footer-wordmark-block {
    position: relative;
    margin-top: 0;
    padding-bottom: 0;
  }

  .footer-firstname {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(1.35rem, 3.2vw, 2.35rem);
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.15;
    margin: 0 0 10px;
    padding-right: 0.35em;
    width: max-content;
    max-width: 100%;
    overflow: visible;
    opacity: 0;
    transform: translateY(16px);
  }

  .footer-wordmark-wrap {
    position: relative;
    overflow: hidden;
    line-height: 0.78;
  }

  .footer-wordmark {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(4.2rem, 16.5vw, 13.5rem);
    letter-spacing: -0.045em;
    color: var(--accent);
    white-space: nowrap;
    display: flex;
    align-items: flex-end;
    width: max-content;
    max-width: 100%;
    margin: 0;
    padding-bottom: 0.04em;
    position: relative;
  }

  .wm-letter {
    display: inline-block;
    transform: translateY(110%);
  }

  .wm-letter-y {
    position: relative;
  }

  .footer-copy {
    position: absolute;
    font-family: var(--font-body);
    font-size: clamp(0.72rem, 1.05vw, 0.92rem);
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    line-height: 1;
    z-index: 4;
    pointer-events: none;
    opacity: 0;
  }

  .wordmark-dot {
    display: inline-block;
    width: 0.11em;
    height: 0.11em;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 0.02em;
    align-self: flex-start;
    margin-top: 0.18em;
    transform: scale(0);
    transform-origin: center;
    flex-shrink: 0;
  }

  .scroll-top-btn {
    position: absolute;
    right: 0;
    bottom: 10px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #ffffff;
    color: #111111;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(0);
    z-index: 5;
    transition: transform 0.3s var(--ease);
  }

  .scroll-top-btn:hover { transform: scale(1.06); }

  .scroll-top-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
  }

  @media (max-width: 980px) {
    .footer { padding: 56px 28px 0; }
    .footer-main {
      grid-template-columns: 1fr 1fr;
      gap: 40px 32px;
    }
    .footer-brand { grid-column: 1 / -1; }
    .footer-tagline { max-width: 420px; }
  }

  @media (max-width: 640px) {
    .footer { padding: 48px 20px 0; }
    .footer-main {
      grid-template-columns: 1fr;
      gap: 36px;
      padding-bottom: 48px;
    }
    .footer-tagline { font-size: clamp(1.75rem, 8vw, 2.25rem); }
    .footer-copy {
      font-size: 0.65rem;
    }
    .scroll-top-btn {
      right: 0;
      bottom: 8px;
      width: 42px;
      height: 42px;
    }
  }
</style>
</head>
<body>

<p class="demo-filler">// Composant footer autonome — scrollez pour déclencher les animations.</p>

<footer class="footer" id="contact">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
  gsap.registerPlugin(ScrollTrigger);

  const wordmark = document.getElementById('wordmark');
  const footerCopy = document.getElementById('footerCopy');
  const wordmarkBlock = document.querySelector('.footer-wordmark-block');
  const rawText = wordmark.childNodes[0].textContent;
  wordmark.childNodes[0].textContent = '';
  [...rawText].forEach((ch) => {
    const span = document.createElement('span');
    span.className = 'wm-letter';
    span.textContent = ch;
    if (ch === 'y') span.classList.add('wm-letter-y');
    wordmark.insertBefore(span, wordmark.querySelector('.wordmark-dot'));
  });

  function placeCopyBesideY() {
    const yLetter = wordmark.querySelector('.wm-letter-y');
    if (!yLetter || !footerCopy) return;
    const blockRect = wordmarkBlock.getBoundingClientRect();
    const yRect = yLetter.getBoundingClientRect();
    /* juste AVANT le "y" (à gauche), en bas de la ligne */
    const left = yRect.left - blockRect.left - footerCopy.offsetWidth - 10;
    const top = yRect.bottom - blockRect.top - footerCopy.offsetHeight - 2;
    footerCopy.style.left = `${Math.max(0, left)}px`;
    footerCopy.style.top = `${top}px`;
  }

  placeCopyBesideY();
  window.addEventListener('resize', placeCopyBesideY);

  const footerTl = gsap.timeline({
    scrollTrigger: { trigger: '.footer', start: 'top 75%' },
    defaults: { ease: 'power3.out' },
  });

  footerTl
    .to('.footer-brand', { opacity: 1, y: 0, duration: 0.7 })
    .to('.footer-col', { opacity: 1, y: 0, stagger: 0.12, duration: 0.65 }, 0.15)
    .to('.footer-firstname', { opacity: 1, y: 0, duration: 0.55 }, '-=0.35')
    .to('.wm-letter', { y: 0, stagger: 0.02, duration: 0.7, ease: 'power4.out' }, '-=0.3')
    .to('.wordmark-dot', { scale: 1, duration: 0.45, ease: 'back.out(3)' }, '-=0.25')
    .to('.scroll-top-btn', { scale: 1, duration: 0.4, ease: 'back.out(2)' }, '-=0.35')
    .to('.footer-copy', { opacity: 1, duration: 0.4 }, '-=0.2');

  footerTl.eventCallback('onComplete', placeCopyBesideY);
  /* recalcule aussi pendant l'anim des lettres */
  gsap.ticker.add(placeCopyBesideY);
  setTimeout(() => gsap.ticker.remove(placeCopyBesideY), 2500);

  document.getElementById('scrollTopBtn').addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>
<script src="cursor.js"></script>
</body>
</html>
